<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日没カウントダウン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: rgba(255,255,255,0.07);
    --text-primary: #f0ede8;
    --text-secondary: #7a7f8a;
    --amber: #e8a040;
    --amber-dim: rgba(232,160,64,0.12);
    --amber-mid: rgba(232,160,64,0.35);
    --coral: #d96040;
    --sky: #5ba8d4;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .widget {
    width: 100%;
    max-width: 480px;
  }

  /* 太陽アニメーション */
  .sun-scene {
    position: relative;
    height: 120px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .horizon {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber-mid), transparent);
  }
  .sun-track {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 110px;
  }
  .sun-dot {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 24px 8px rgba(232,160,64,0.4);
    transform: translate(-50%, 50%);
    transition: left 60s linear, bottom 60s linear;
  }
  .glow-line {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 0;
    background: linear-gradient(to top, var(--amber-mid), transparent);
    transition: height 1s ease;
  }

  /* メインカード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 10px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.2rem;
  }
  .card-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 100px;
    border: 1px solid var(--amber-mid);
    color: var(--amber);
    background: var(--amber-dim);
  }
  .badge.dim {
    border-color: var(--border);
    color: var(--text-secondary);
    background: transparent;
  }

  .sunset-time {
    font-family: 'DM Mono', monospace;
    font-size: 52px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .sunset-date {
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* カウントダウン */
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 1.25rem;
  }
  .countdown-unit {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.5rem;
    text-align: center;
  }
  .countdown-val {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 400;
    color: var(--amber);
    line-height: 1;
    display: block;
  }
  .countdown-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 4px;
    display: block;
    letter-spacing: 0.08em;
  }
  .countdown-unit.zero .countdown-val {
    color: var(--text-secondary);
  }

  /* プログレスバー */
  .progress-section {
    margin-top: 1.25rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
  }
  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #5ba8d4, #e8a040, #d96040);
    transition: width 1s linear;
    width: 0%;
  }

  /* 現在時刻 */
  .current-time-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .current-time-label {
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .current-time-val {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: 0.02em;
  }

  /* フッター */
  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--text-secondary);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-top: 6px;
  }

  /* 済みメッセージ */
  .after-sunset {
    text-align: center;
    padding: 1rem;
    color: var(--text-secondary);
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="widget">

  <!-- 太陽アニメーション -->
  <div class="sun-scene">
    <div class="glow-line" id="glow-line"></div>
    <div class="sun-track">
      <div class="sun-dot" id="sun-dot"></div>
    </div>
    <div class="horizon"></div>
  </div>

  <!-- 現在時刻 -->
  <div class="current-time-row">
    <span class="current-time-label">現在時刻</span>
    <span class="current-time-val" id="current-time">--:--:--</span>
  </div>

  <!-- メインカード -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">本日の日没</span>
      <span class="badge" id="status-badge">取得中</span>
    </div>
    <div class="sunset-time" id="sunset-time">--:--</div>
    <div class="sunset-date" id="sunset-date">---</div>

    <!-- カウントダウン -->
    <div class="countdown-grid" id="countdown-grid">
      <div class="countdown-unit" id="unit-h">
        <span class="countdown-val" id="cd-h">--</span>
        <span class="countdown-label">時間</span>
      </div>
      <div class="countdown-unit" id="unit-m">
        <span class="countdown-val" id="cd-m">--</span>
        <span class="countdown-label">分</span>
      </div>
      <div class="countdown-unit" id="unit-s">
        <span class="countdown-val" id="cd-s">--</span>
        <span class="countdown-label">秒</span>
      </div>
    </div>

    <!-- プログレスバー -->
    <div class="progress-section">
      <div class="progress-meta">
        <span id="sunrise-label">日出 --:--</span>
        <span id="progress-pct">0%</span>
        <span id="sunset-label">日没 --:--</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="footer">Open-Meteo API &nbsp;·&nbsp; 位置情報: ブラウザ自動取得 &nbsp;·&nbsp; 毎秒更新</div>
</div>

<script>
  let sunriseTs = null, sunsetTs = null;

  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function fmtHM(d) {
    return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  }

  function updateSunPosition(pct) {
    const dot = document.getElementById('sun-dot');
    const glow = document.getElementById('glow-line');
    const p = Math.min(1, Math.max(0, pct / 100));
    // 半円弧上を移動 (左→頂点→右)
    const angle = Math.PI * (1 - p); // π → 0
    const cx = 110, r = 100;
    const x = cx - r * Math.cos(angle);
    const y = r * Math.sin(angle); // 上方向
    dot.style.left = x + 'px';
    dot.style.bottom = y + 'px';
    glow.style.height = Math.max(0, y - 10) + 'px';
  }

  function updateUI() {
    const now = new Date();
    // 時刻
    document.getElementById('current-time').textContent =
      now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    if (!sunsetTs) return;

    const diff = sunsetTs - now.getTime();
    const badge = document.getElementById('status-badge');

    if (diff > 0) {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-h').textContent = pad(h);
      document.getElementById('cd-m').textContent = pad(m);
      document.getElementById('cd-s').textContent = pad(s);
      // ゼロのユニットを暗く
      document.getElementById('unit-h').className = 'countdown-unit' + (h === 0 ? ' zero' : '');
      document.getElementById('unit-m').className = 'countdown-unit' + (h === 0 && m === 0 ? ' zero' : '');
      badge.textContent = '日照中';
      badge.className = 'badge';
    } else {
      document.getElementById('cd-h').textContent = '00';
      document.getElementById('cd-m').textContent = '00';
      document.getElementById('cd-s').textContent = '00';
      ['unit-h','unit-m','unit-s'].forEach(id => {
        document.getElementById(id).className = 'countdown-unit zero';
      });
      badge.textContent = '日没済み';
      badge.className = 'badge dim';
    }

    if (sunriseTs) {
      const total = sunsetTs - sunriseTs;
      const elapsed = now.getTime() - sunriseTs;
      const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
      document.getElementById('progress-fill').style.width = pct.toFixed(1) + '%';
      document.getElementById('progress-pct').textContent = Math.round(pct) + '%';
      updateSunPosition(pct);
    }
  }

  async function fetchData(lat, lon) {
    const today = new Date().toISOString().slice(0, 10);
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=sunrise,sunset&timezone=auto&start_date=${today}&end_date=${today}`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const sr = new Date(data.daily.sunrise[0]);
      const ss = new Date(data.daily.sunset[0]);
      sunriseTs = sr.getTime();
      sunsetTs = ss.getTime();

      document.getElementById('sunset-time').textContent = fmtHM(ss);
      document.getElementById('sunset-date').textContent =
        ss.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
      document.getElementById('sunrise-label').textContent = '日出 ' + fmtHM(sr);
      document.getElementById('sunset-label').textContent = '日没 ' + fmtHM(ss);
    } catch(e) {
      document.getElementById('sunset-time').textContent = 'ERR';
    }
  }

  function init() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => fetchData(pos.coords.latitude, pos.coords.longitude),
        ()   => fetchData(34.6937, 135.5022) // 大阪フォールバック
      );
    } else {
      fetchData(34.6937, 135.5022);
    }
  }

  init();
  setInterval(updateUI, 1000);
  updateUI();
</script>
</body>
</html>
